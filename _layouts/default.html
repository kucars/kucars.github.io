<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.short_title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="icon" href="{{ site.data.center.logo | relative_url }}" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    <script src="{{ '/assets/js/upscale-blur.js' | relative_url }}"></script>
  </head>
  <body>
    {% include header.html %}
    <main id="main-content">
      {{ content }}
    </main>
    {% include footer.html %}
  </body>
</html>

- slug: autonomous-vehicles
  title: Autonomous Vehicles Lab
  short_title: AVLab
  order: 1
  theme_number: 1
  description: "Autonomous vehicle research for safe operation, smart urban ecosystems, passenger-centered mobility, V2X-enabled perception, and rigorous decision making under uncertainty."
  focus_title: Research Focus
  focus_intro: "We study safe autonomy under realistic uncertainty and deployment constraints, combining formal methods and real-world validation for safety-critical systems."
  focus_areas:
    - title: Decision-making
      description: Formal analysis of autonomous decision pipelines, including failure modes, safety guarantees, and verification under uncertainty.
    - title: Multi-agent coordination
      description: Coordination and information sharing under uncertainty, including communication constraints and trust assumptions.
    - title: Risk-bounded planning
      description: Planning and control methods that explicitly encode risk, enabling safety guarantees rather than empirical tuning.
  hero_image: /assets/images/research/autonomous-vehicles/avlab-msap-hero.png


<header class="site-header">
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div class="wrap site-header__inner">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
      <img
        class="brand__logo"
        src="{{ site.data.center.banner_logo | relative_url }}"
        alt="{{ site.data.center.university_name }} — {{ site.data.center.name | replace: 'KU ', '' }}"
        width="326"
        height="130"
        decoding="async"
      >
    </a>
    <input type="checkbox" id="nav-toggle" class="nav-toggle">
    <label for="nav-toggle" class="nav-toggle-btn" aria-label="Open menu"></label>
    <nav class="nav" aria-label="Main navigation">
      {% for item in site.data.navigation %}
        <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}aria-current="page"{% endif %}>{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>

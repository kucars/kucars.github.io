<footer class="site-footer">
  <div class="wrap site-footer__inner">
    <div class="site-footer__brand">
      <img class="site-footer__logo" src="{{ site.data.center.logo | relative_url }}" alt="" width="36" height="36" aria-hidden="true">
      <div>
        <strong>{{ site.data.center.name }}</strong>
        <p>AI-driven robotics research at Khalifa University, Abu Dhabi.</p>
      </div>
    </div>
    <div class="site-footer__links">
      {% for item in site.data.navigation %}
        <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
      {% endfor %}
    </div>
  </div>
</footer>
